services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agripulse}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-agripulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -l info
    env_file:
      - ./backend/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
