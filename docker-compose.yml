services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agripulse}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker -l info
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
